<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNHS ILAW Lesson Planner</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">
            📘 UNHS ILAW Lesson Planner
        </span>
    </div>
</nav>

<div class="container mt-4">

    <div class="text-center mb-5">
        <h2>Welcome!</h2>
        <p class="text-muted">
            Browser-Based ILAW Lesson Plan Generator
        </p>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow h-100">
                <div class="card-body text-center">

                    <h1>📄</h1>

                    <h4>New Lesson</h4>

                    <p>Create a new 5-Day ILAW Lesson Plan.</p>

                    <button class="btn btn-primary w-100">
                        Create Lesson
                    </button>

                </div>
            </div>
        </div>

        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h1>📂</h1>

                    <h4>Open Lesson</h4>

                    <p>Open previously saved lesson.</p>

                    <button class="btn btn-success w-100">
                        Open
                    </button>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow h-100">

                <div class="card-body text-center">

                    <h1>⚙️</h1>

                    <h4>Settings</h4>

                    <p>Configure the application.</p>

                    <button class="btn btn-secondary w-100">
                        Settings
                    </button>

                </div>

            </div>

        </div>

    </div>

    <div class="mt-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h5 class="mb-0">

                    Recent Lessons

                </h5>

            </div>

            <div class="card-body">

                <p class="text-muted">

                    No lessons available.

                </p>

            </div>

        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
